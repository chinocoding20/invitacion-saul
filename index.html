<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Primera Comunión de Saúl Santiago" />
  <title>Primera Comunión · Saúl Santiago</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<main class="wrapper" aria-label="Invitación Primera Comunión">
<div class="card">

  <!-- ============================================================
       CONTENIDO — z-index:2 encima de las ramas
       ============================================================ -->
  <div class="card__body">

    <!-- Texto superior -->
    <p class="top-text">TE INVITAMOS A CELEBRAR<br>CON NOSOTROS LA</p>
    <p class="primera-comunion">Primera Comunión<br><span class="de-label">de</span></p>

    <!-- Imagen emblema circular (reemplaza cáliz + PRIMERA/Comunión + nombre) -->
    <img
      src="emblema.jpg"
      alt="Saúl Santiago — Primera Comunión"
      class="emblema"
    />

    <!-- ============================================================
         DETALLES: FECHA, HORA, LUGAR
         ============================================================ -->
    <section class="details" aria-label="Detalles del evento">

      <div class="detail-row">
        <div class="detail-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="3"  y1="9" x2="21" y2="9"  stroke="currentColor" stroke-width="1.5"/>
            <line x1="8"  y1="2" x2="8"  y2="6"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="16" y1="2" x2="16" y2="6"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="detail-text">
          <span class="detail-label">FECHA</span>
          <span class="detail-value">08 de agosto</span>
        </div>
      </div>

      <div class="detail-sep"></div>

      <div class="detail-row">
        <div class="detail-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
            <polyline points="12 7 12 12 15.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="detail-text">
          <span class="detail-label">HORA</span>
          <span class="detail-value">1:00 pm</span>
        </div>
      </div>

      <div class="detail-sep"></div>

      <div class="detail-row">
        <div class="detail-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </div>
        <div class="detail-text">
          <span class="detail-label">LUGAR</span>
          <span class="detail-value">Local 33, habrá piscina!!</span>
        </div>
      </div>

    </section><!-- /.details -->

    <!-- Corazón -->
    <div class="heart-icon" aria-hidden="true">
      <svg viewBox="0 0 20 18" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 17C10 17 1 11 1 6C1 3.5 3 2 5 2C7 2 9 3.5 10 5C11 3.5 13 2 15 2C17 2 19 3.5 19 6C19 11 10 17 10 17Z" fill="#C9A86A" opacity=".72"/>
      </svg>
    </div>

    <!-- Texto de cierre -->
    <p class="closing-text">SU PRESENCIA HARÁ<br>ESTE DÍA AÚN MÁS ESPECIAL.</p>

    <!-- Swirl cierre -->
    <div class="closing-swirl" aria-hidden="true">
      <svg viewBox="0 0 130 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 10Q17 4 29 10Q41 16 53 10Q65 4 77 10" stroke="#C9A86A" stroke-width=".85" fill="none" stroke-linecap="round" opacity=".58"/>
        <circle cx="65" cy="10" r="2" fill="#C9A86A" opacity=".62"/>
        <path d="M53 10Q65 4 77 10Q89 16 101 10Q113 4 125 10" stroke="#C9A86A" stroke-width=".85" fill="none" stroke-linecap="round" opacity=".58"/>
      </svg>
    </div>

    <!-- Familia -->
    <section class="family">
      <p class="family-block">
        <span class="family-label">Sus padres</span>
        Christian Herrera &amp; Ricardo Canto
      </p>
      <p class="family-block family-block--god">
        <span class="family-label">Su madrina</span>
        Fabiola Trejo Solís
      </p>
    </section>

    <!-- ============================================================
         BOTONES
         ============================================================ -->
    <section class="actions" aria-label="Acciones">

      <!-- WhatsApp -->
      <a class="btn btn--primary"
         href="https://wa.me/529994588683?text=Hola%2C%20confirmo%20mi%20asistencia%20a%20la%20Primera%20Comuni%C3%B3n%20de%20Sa%C3%BAl%20%F0%9F%A4%8D"
         target="_blank" rel="noopener noreferrer" aria-label="Confirmar asistencia por WhatsApp">
        <svg class="btn__icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M20.52 3.48A11.93 11.93 0 0 0 12 0C5.37 0 0 5.37 0 12c0 2.11.55 4.17 1.6 5.98L0 24l6.18-1.62A11.94 11.94 0 0 0 12 24c6.63 0 12-5.37 12-12 0-3.2-1.25-6.21-3.48-8.52zm-8.52 18.4a9.9 9.9 0 0 1-5.04-1.38l-.36-.21-3.72.98.99-3.63-.23-.37A9.9 9.9 0 0 1 2.1 12C2.1 6.52 6.52 2.1 12 2.1A9.9 9.9 0 0 1 21.9 12c0 5.48-4.42 9.88-9.9 9.88zm5.43-7.4c-.3-.15-1.76-.87-2.03-.97-.27-.1-.47-.15-.67.15s-.77.97-.94 1.17c-.17.2-.34.22-.63.07a7.9 7.9 0 0 1-2.33-1.44 8.73 8.73 0 0 1-1.61-2c-.17-.3-.02-.46.13-.6.13-.13.3-.34.45-.51.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37s-1.04 1.02-1.04 2.48 1.07 2.88 1.21 3.08c.15.2 2.1 3.2 5.08 4.49.71.31 1.26.49 1.69.63.71.23 1.36.2 1.87.12.57-.09 1.76-.72 2.01-1.41.25-.69.25-1.28.17-1.41-.07-.12-.27-.2-.57-.34z" fill="currentColor"/>
        </svg>
        Confirmar asistencia
      </a>

      <!-- Maps -->
      <a class="btn btn--secondary"
         href="https://maps.app.goo.gl/WrVgxEEJJoNvr5ob8"
         target="_blank" rel="noopener noreferrer" aria-label="Ver cómo llegar en Google Maps">
        <svg class="btn__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.8"/>
        </svg>
        Cómo llegar
      </a>

    </section><!-- /.actions -->

  </div><!-- /.card__body -->
</div><!-- /.card -->
</main>

<script src="script.js"></script>
</body>
</html>
